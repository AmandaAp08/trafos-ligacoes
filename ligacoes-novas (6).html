<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trafos - Ligações</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
body { margin:0; font-family:Arial; background:#0f1117; color:white; }
header { padding:10px; background:#1a1d27; font-weight:bold; }
#map { height:90vh; }
.panel {
  position:absolute; top:60px; left:10px;
  background:#1a1d27; padding:10px;
  border-radius:8px; width:250px;
}
button {
  width:100%; margin-top:5px;
  padding:8px; border:none;
  border-radius:6px; cursor:pointer;
}
.apto { background:green; }
.nao { background:red; }
.inst { background:blue; }
</style>
</head>

<body>

<header>Trafos - Ligações</header>

<div id="map"></div>

<div class="panel">
  <div id="info">Clique em um trafo</div>
  <button class="apto" onclick="setStatus('apto')">Apto</button>
  <button class="nao" onclick="setStatus('nao_apto')">Não Apto</button>
  <button class="inst" onclick="setStatus('instalado')">Instalado</button>
</div>

<script>
// 🔥 FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyD3k...",
  authDomain: "trafos-ligacoes.firebaseapp.com",
  databaseURL: "https://trafos-ligacoes-default-rtdb.firebaseio.com",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 🗺️ MAPA
const map = L.map('map').setView([-5.09, -42.81], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// 📦 DADOS DE TESTE (já aparece no mapa)
let trafos = [
  { id: "T1", lat: -5.09, lng: -42.81 },
  { id: "T2", lat: -5.10, lng: -42.82 },
];

let selected = null;
let markers = {};

// 📍 CRIAR MARCADORES
trafos.forEach(t => {
  const m = L.marker([t.lat, t.lng]).addTo(map);

  m.on("click", () => {
    selected = t;
    document.getElementById("info").innerText = "Selecionado: " + t.id;
  });

  markers[t.id] = m;
});

// 🔄 SALVAR STATUS
function setStatus(status){
  if(!selected){
    alert("Selecione um trafo");
    return;
  }

  db.ref("status/" + selected.id).set({
    status: status,
    data: Date.now()
  });

  alert("Salvo: " + status);
}
</script>

</body>
</html>
